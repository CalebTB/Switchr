<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Details - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <script src="../../js/auth.js"></script>
  <style>
    .main { max-width: 1100px; }

    .listing-grid {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .listing-left { flex: 1; }
    .listing-right { width: 320px; }

    .gallery { display: block; }

    .gallery-main {
      width: 100%;
      height: 440px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: zoom-in;
    }

    .gallery-main img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .gallery-main .no-image {
      font-size: 13px;
      color: #aaa;
    }

    .gallery-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .gallery-thumb {
      width: 72px;
      height: 72px;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      background: #fafaf8;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.12s;
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-thumb:hover { border-color: #888; }
    .gallery-thumb.active { border-color: #1a1a1a; border-width: 2px; }

    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox-overlay.active { display: flex; }

    .lightbox-overlay img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      color: white;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .listing-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .seller-info {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 500; }

    .price-display {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      color: #1a1a1a;
      margin: 16px 0;
    }

    .btn { display: block; width: 100%; margin-bottom: 10px; }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 8px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #888;
      margin-bottom: 6px;
    }

    .modal select, .modal input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      margin-bottom: 16px;
    }

    .modal select:focus, .modal input:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div id="nav-root"></div>
<script src="/js/nav.js"></script>

<div class="header-bar">
  <p class="breadcrumb">
    <a href="/pages/buyer/browse.html">&larr; Back to Browse</a>
  </p>
</div>

<div class="main">

  <div class="error-banner" id="errorBanner"></div>

  <div id="listingContent" class="listing-grid">
    <div class="listing-left">
      <div class="card">
        <p style="color:#aaa; text-align:center; padding:20px;">Loading listing...</p>
      </div>
    </div>
  </div>

</div>

<!-- Trade Offer Modal -->
<div class="modal-overlay" id="tradeModal">
  <div class="modal">
    <h3>Offer a Trade</h3>
    <p style="font-size:13px;color:#888;margin-bottom:16px;">Select one of your active listings to offer in exchange.</p>

    <label>Your Item to Offer</label>
    <select id="tradeOfferListing">
      <option value="">Loading your listings...</option>
    </select>

    <label>Add Cash (optional)</label>
    <input type="number" id="tradeCashOffer" placeholder="0.00" min="0" step="0.01">

    <div class="modal-actions">
      <button class="btn" onclick="closeTradeModal()">Cancel</button>
      <button class="btn primary" onclick="submitTrade()">Send Trade Offer</button>
    </div>
  </div>
</div>

<!-- Lightbox for fullsize gallery image -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox(event)">
  <button type="button" class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  // gallery interaction
  function setGalleryImage(index) {
    var photos = window.__galleryPhotos || [];
    if (!photos[index]) return;
    var mainImg = document.getElementById('galleryMainImg');
    if (mainImg) mainImg.src = photos[index];
    document.querySelectorAll('#galleryThumbs .gallery-thumb').forEach(function(t) {
      t.classList.toggle('active', parseInt(t.getAttribute('data-index')) === index);
    });
  }

  function openLightbox() {
    var mainImg = document.getElementById('galleryMainImg');
    if (!mainImg) return;
    document.getElementById('lightboxImg').src = mainImg.src;
    document.getElementById('lightboxOverlay').classList.add('active');
  }

  function closeLightbox(event) {
    // ignore clicks that bubbled up from the image itself
    if (event && event.target.tagName === 'IMG') return;
    document.getElementById('lightboxOverlay').classList.remove('active');
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  // auth header
  var authLinks = document.getElementById('authLinks');
  if (isLoggedIn()) {
    var user = getUser();
    var links = '';
    if (user && user.role === 'admin') {
      links += '<a href="/pages/admin/dashboard.html">Admin Dashboard</a>';
    }
    links += '<a href="/pages/seller/dashboard.html">My Listings</a>';
    links += '<a href="#" onclick="logout()">Logout</a>';
    authLinks.innerHTML = links;
  } else {
    authLinks.innerHTML = '<a href="/pages/auth/login.html">Login</a>';
  }

  // get listing ID from URL
  var params = new URLSearchParams(window.location.search);
  var listingId = params.get('id');

  if (!listingId) {
    window.location.href = '/pages/buyer/browse.html';
  }

  fetch('/api/listings/browse/' + listingId)
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) {
      var banner = document.getElementById('errorBanner');
      banner.textContent = data.error;
      banner.style.display = 'block';
      return;
    }

    var l = data.listing;
    window.currentListing = l;
    var typeClass = l.listing_type ? l.listing_type.toLowerCase() : 'sale';
    var typeLabel = l.listing_type === 'SALE' ? 'For Sale'
                  : l.listing_type === 'TRADE' ? 'For Trade'
                  : l.listing_type === 'AUCTION' ? 'Auction'
                  : 'Sale or Trade';

    document.title = l.title + ' - Switchr';

    var html = '<div class="listing-left">';

    var photos = (l.photo_urls && l.photo_urls.length) ? l.photo_urls : [];

    html += '<div class="card">';
    html += '<div class="gallery">';
    if (photos.length === 0) {
      html += '<div class="gallery-main"><span class="no-image">No Image</span></div>';
    } else {
      html += '<div class="gallery-main" id="galleryMain" onclick="openLightbox()">';
      html += '<img id="galleryMainImg" src="' + photos[0] + '" alt="' + (l.title || 'Listing photo') + '">';
      html += '</div>';
      if (photos.length > 1) {
        html += '<div class="gallery-thumbs" id="galleryThumbs">';
        photos.forEach(function(url, i) {
          html += '<button type="button" class="gallery-thumb' + (i === 0 ? ' active' : '') + '" '
               +  'data-index="' + i + '" onclick="setGalleryImage(' + i + ')">'
               +  '<img src="' + url + '" alt="">'
               +  '</button>';
        });
        html += '</div>';
      }
    }
    html += '</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<h1 class="listing-title">' + l.title + '</h1>';
    html += '<p class="seller-info">Listed by <strong>' + l.seller_username + '</strong> &middot; ' + (l.created_at || '') + '</p>';
    html += '<h3 style="margin-bottom:8px;">Description</h3>';
    html += '<p style="font-size:14px; line-height:1.6; color:#444; margin-bottom:0;">' + l.description + '</p>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">' + l.category + '</span></div>';
    html += '<div class="detail-row"><span class="detail-label">Condition</span><span class="detail-value">' + l.condition + '</span></div>';
    html += '<div class="detail-row"><span class="detail-label">Listing Type</span><span class="detail-value"><span class="badge ' + typeClass + '">' + typeLabel + '</span></span></div>';
    html += '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">' + l.status + '</span></div>';
    html += '</div>';

    window.__galleryPhotos = photos;

    html += '</div>'; // end listing-left

    html += '<div class="listing-right">';
    html += '<div class="card">';

    if (l.listing_type === 'AUCTION') {
      html += '<p style="font-size:12px;color:#888;margin:0;">Current bid</p>';
      html += '<p class="price-display" id="currentPrice">$' + parseFloat(l.price).toFixed(2) + '</p>';
      html += '<p style="font-size:13px;color:#c62828;font-weight:600;" id="auctionCountdown" data-end="' + l.auction_end_time + '">Ends in ...</p>';
      html += '<div style="margin-top:14px;">';
      html += '<label style="font-size:12px;color:#888;">Your bid ($)</label>';
      html += '<input type="number" id="bidAmount" min="0.01" step="0.01" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:4px;margin:6px 0 10px;">';
      html += '<button class="btn primary" id="placeBidBtn" onclick="placeBid(' + l.id + ')">Place Bid</button>';
      html += '</div>';
      html += '<div style="margin-top:18px;">';
      html += '<h4 style="font-size:13px;margin-bottom:8px;">Bid History</h4>';
      html += '<ul id="bidList" style="list-style:none;padding:0;margin:0;font-size:13px;max-height:200px;overflow-y:auto;"></ul>';
      html += '</div>';
      html += '</div></div>';
      document.getElementById('listingContent').innerHTML = html;
      loadBids(l.id);
      startAuctionCountdown();
      return;
    }

    html += '<p class="price-display">$' + parseFloat(l.price).toFixed(2) + '</p>';
    var qty = l.quantity || 0;
    if (qty <= 0) {
        html += '<p style="color:#c62828;font-weight:600;font-size:14px;margin-bottom:12px;">Sold Out</p>';
    } else if (qty <= 3) {
        html += '<p style="color:#e65100;font-weight:600;font-size:13px;margin-bottom:12px;">Only ' + qty + ' left in stock!</p>';
    } else {
        html += '<p style="color:#2d7a3a;font-weight:600;font-size:13px;margin-bottom:12px;">' + qty + ' in stock</p>';
    }

    if (l.listing_type === 'SALE' || l.listing_type === 'BOTH') {
      if (qty <= 0) {
          html += '<button class="btn primary" disabled style="opacity:0.5;cursor:not-allowed;">Sold Out</button>';
      } else {
          html += '<button class="btn primary" onclick="addToCart(' + l.id + ')">Add to Cart</button>';
          html += '<a class="btn" href="/pages/buyer/cart.html" style="text-align:center; text-decoration:none;">View Cart</a>'; html += '<button class="btn" onclick="addToWishlist(' + l.id + ')">Save to Wishlist</button>';
      }
    }
    if (l.listing_type === 'TRADE' || l.listing_type === 'BOTH') {
      if (qty > 0) {
          html += '<button class="btn" onclick="openTradeModal(' + l.id + ')">Offer Trade</button>';
      }
    }

    html += '</div>';
    html += '</div>';

    document.getElementById('listingContent').innerHTML = html;
  })
  .catch(function() {
    var banner = document.getElementById('errorBanner');
    banner.textContent = 'Could not load listing. Please try again.';
    banner.style.display = 'block';
  });

  function addToCart(listingId) {
    var token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/pages/auth/login.html';
      return;
    }

    fetch('/api/cart', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ listing_id: listingId })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.message) {
        alert('Added to cart! Go to cart to checkout.');
      } else {
        alert(data.error || 'Could not add to cart.');
      }
    })
    .catch(function() {
      alert('Network error. Try again.');
    });
  }

  function addToWishlist(listingId) {
    var token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/pages/auth/login.html';
      return;
    }

    fetch('/api/wishlist', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ listing_id: listingId })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.message) {
        alert('Saved to wishlist!');
      } else {
        alert(data.error || 'Could not save to wishlist.');
      }
    })
    .catch(function() {
      alert('Network error. Try again.');
    });
  }

  var tradeWantedId = null;

  function openTradeModal(wantedListingId) {
    var token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/pages/auth/login.html';
      return;
    }

    tradeWantedId = wantedListingId;

    // Load user's active listings
    fetch('/api/listings/mine', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var select = document.getElementById('tradeOfferListing');
      var listings = data.listings || [];

      if (listings.length === 0) {
        select.innerHTML = '<option value="">You have no active listings to trade</option>';
      } else {
        var html = '<option value="">-- Select your item --</option>';
        listings.forEach(function(l) {
          html += '<option value="' + l.id + '">' + l.title + ' ($' + parseFloat(l.price).toFixed(2) + ' - ' + l.condition + ')</option>';
        });
        select.innerHTML = html;
      }

      document.getElementById('tradeCashOffer').value = '';
      document.getElementById('tradeModal').classList.add('active');
    });
  }

  function closeTradeModal() {
    document.getElementById('tradeModal').classList.remove('active');
    tradeWantedId = null;
  }

  function submitTrade() {
    var offeredId = document.getElementById('tradeOfferListing').value;
    var cashOffer = parseFloat(document.getElementById('tradeCashOffer').value) || 0;
    var token = localStorage.getItem('token');

    if (!offeredId) {
      alert('Please select one of your items to offer.');
      return;
    }

    fetch('/api/trades', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        offered_listing_id: parseInt(offeredId),
        wanted_listing_id: tradeWantedId,
        cash_offer: cashOffer
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        alert(data.error);
      } else {
        alert('Trade offer sent! The seller will be notified.');
        closeTradeModal();
      }
    })
    .catch(function() {
      alert('Could not send trade offer. Try again.');
    });
  }

  function fmtCountdown(ms) {
    if (ms <= 0) return 'Ended';
    var s = Math.floor(ms / 1000);
    var d = Math.floor(s / 86400); s -= d * 86400;
    var h = Math.floor(s / 3600);  s -= h * 3600;
    var m = Math.floor(s / 60);    s -= m * 60;
    if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
    if (h > 0) return h + 'h ' + m + 'm ' + s + 's';
    return m + 'm ' + s + 's';
  }

  function startAuctionCountdown() {
    setInterval(function() {
      var el = document.getElementById('auctionCountdown');
      if (!el) return;
      var end = new Date(el.getAttribute('data-end')).getTime();
      var left = end - Date.now();
      if (left <= 0) {
        el.textContent = 'Auction ended';
        var btn = document.getElementById('placeBidBtn');
        var input = document.getElementById('bidAmount');
        if (btn) btn.disabled = true;
        if (input) input.disabled = true;
      } else {
        el.textContent = 'Ends in ' + fmtCountdown(left);
      }
    }, 1000);
  }

  function loadBids(listingId) {
    fetch('/api/listings/' + listingId + '/bids')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var ul = document.getElementById('bidList');
        if (!ul) return;
        var bids = data.bids || [];
        if (bids.length === 0) {
          ul.innerHTML = '<li style="color:#888;">No bids yet. Be the first!</li>';
          return;
        }
        ul.innerHTML = bids.map(function(b) {
          return '<li style="padding:6px 0;border-bottom:1px solid #f0f0f0;">'
               + '<strong>$' + b.amount.toFixed(2) + '</strong> '
               + '<span style="color:#888;">by ' + b.username + ' &middot; ' + b.created_at + '</span>'
               + '</li>';
        }).join('');
      });
  }

  function placeBid(listingId) {
    var token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/pages/auth/login.html';
      return;
    }
    var amount = parseFloat(document.getElementById('bidAmount').value);
    if (!amount || amount <= 0) {
      alert('Enter a valid bid amount.');
      return;
    }
    fetch('/api/listings/' + listingId + '/bid', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ amount: amount })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, body: d }; }); })
    .then(function(res) {
      if (!res.ok) {
        alert(res.body.error || 'Bid failed.');
        return;
      }
      document.getElementById('currentPrice').textContent = '$' + res.body.current_price.toFixed(2);
      document.getElementById('bidAmount').value = '';
      loadBids(listingId);
    })
    .catch(function() { alert('Network error. Try again.'); });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/pages/auth/login.html';
  }
</script>

</body>
</html>
