<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <script src="../../js/auth.js"></script>
  <style>
    .main { max-width: 700px; }
    .header-bar h1 { font-size: 22px; }

    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #1a1a1a;
    }

    .invoice-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
    }

    .invoice-meta {
      text-align: right;
      font-size: 13px;
      color: #666;
    }

    .invoice-parties {
      display: flex;
      gap: 40px;
      margin-bottom: 24px;
    }

    .invoice-parties div { flex: 1; }

    .invoice-parties h4 {
      font-size: 11px;
      text-transform: uppercase;
      color: #999;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .invoice-parties p {
      font-size: 14px;
      margin: 2px 0;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .invoice-table th {
      background: #f5f5f5;
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #e0e0e0;
    }

    .invoice-table td {
      padding: 12px 14px;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }

    .invoice-total {
      text-align: right;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      padding-top: 12px;
      border-top: 2px solid #1a1a1a;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      background: #e6f4ea;
      color: #2d7a3a;
    }

    .back-link {
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }

    .back-link:hover { color: #1a1a1a; }
  </style>
</head>
<body>

<div id="nav-root"></div>
<script src="/js/nav.js"></script>

<div class="header-bar">
  <h1>Invoice</h1>
  <p class="breadcrumb">
    <a href="/pages/buyer/purchases.html">&larr; Back to Purchases</a>
  </p>
</div>

<div class="main">
  <div class="card" id="invoiceCard">
    <p style="text-align:center; color:#aaa;">Loading invoice...</p>
  </div>
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  var token = localStorage.getItem('token');
  var user = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) {
    window.location.href = '/pages/auth/login.html';
  }

  var authLinks = document.getElementById('authLinks');
  var links = '';
  if (user && user.role === 'admin') {
    links += '<a href="/pages/admin/dashboard.html">Admin Dashboard</a>';
  }
  links += '<a href="/pages/seller/dashboard.html">My Listings</a>';
  links += '<a href="#" onclick="logout()">Logout</a>';
  authLinks.innerHTML = links;

  var params = new URLSearchParams(window.location.search);
  var txnId = params.get('id');

  if (!txnId) {
    window.location.href = '/pages/buyer/purchases.html';
  }

  fetch('/api/transactions/' + txnId, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) {
      document.getElementById('invoiceCard').innerHTML = '<p style="color:#c62828;">Transaction not found.</p>';
      return;
    }

    var t = data.transaction;
    var isBuyer = (t.buyer_id === user.id);

    var html = '';

    html += '<div class="invoice-header">';
    html += '<div><h2>Switchr Invoice</h2><p style="font-size:13px;color:#999;">Transaction #' + t.id + '</p></div>';
    html += '<div class="invoice-meta">';
    var statusClass = t.status.toLowerCase();
    html += '<p><span class="badge ' + statusClass + '">' + t.status + '</span></p>';
    html += '<p>' + t.created_at + '</p>';
    html += '</div>';
    html += '</div>';

    html += '<div class="invoice-parties">';
    html += '<div><h4>Buyer</h4><p>' + t.buyer_username + '</p><p style="font-size:12px;color:#888;">' + t.buyer_email + '</p></div>';
    html += '<div><h4>Seller</h4><p>' + t.seller_username + '</p><p style="font-size:12px;color:#888;">' + t.seller_email + '</p></div>';
    html += '</div>';

    html += '<table class="invoice-table">';
    html += '<tr><th>Item</th><th>Payment Method</th><th style="text-align:right;">Amount</th></tr>';
    html += '<tr><td>' + t.title + '</td><td>' + t.payment_method + '</td><td style="text-align:right;">$' + parseFloat(t.price).toFixed(2) + '</td></tr>';
    html += '</table>';

    html += '<div class="invoice-total">Total: $' + parseFloat(t.price).toFixed(2) + '</div>';

    if (isBuyer && t.status === 'COMPLETED') {
      html += '<div style="margin-top:20px;text-align:right;">';
      html += '<button class="btn danger" onclick="returnItem(' + t.id + ')">Return Item</button>';
      html += '</div>';
    }

    document.getElementById('invoiceCard').innerHTML = html;
  })
  .catch(function() {
    document.getElementById('invoiceCard').innerHTML = '<p style="color:#c62828;">Could not load invoice.</p>';
  });

  function returnItem(id) {
    if (!confirm('Are you sure you want to return this item?')) return;
    fetch('/api/transactions/' + id + '/return', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        alert(data.error);
      } else {
        alert(data.message);
        window.location.reload();
      }
    });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/pages/auth/login.html';
  }
</script>

</body>
</html>
