<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Purchases - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <script src="../../js/auth.js"></script>
  <style>
    .main { max-width: 900px; }
    .header-bar h1 { font-size: 22px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      font-size: 13px;
    }

    thead { background: #1a1a1a; color: white; }

    th {
      padding: 11px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf7; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      background: #e6f4ea;
      color: #2d7a3a;
    }

    .view-link {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }

    .view-link:hover { border-color: #1a1a1a; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-style: italic;
      padding: 28px;
    }

    .review-btn {
      color: #1a1a1a;
      background: #f0e040;
      padding: 3px 8px;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 4px;
    }
    .review-btn:hover { background: #e0d030; }
    .reviewed-tag { color: #888; font-size: 11px; margin-left: 6px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white; border-radius: 8px; padding: 28px;
      width: 90%; max-width: 460px;
    }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 14px; }
    .stars { display: flex; gap: 4px; font-size: 28px; cursor: pointer; margin: 10px 0 16px; }
    .stars span { color: #ddd; transition: color 0.1s; }
    .stars span.on { color: #f0b840; }
    .modal textarea {
      width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; resize: vertical;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .modal-actions button {
      padding: 8px 16px; border-radius: 4px; border: none;
      font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 13px;
    }
    .modal-actions .cancel { background: #eee; }
    .modal-actions .submit { background: #1a1a1a; color: white; }
  </style>
</head>
<body>

<div id="nav-root"></div>
<script src="/js/nav.js"></script>

<div class="header-bar">
  <h1>My Purchases</h1>
</div>

<div class="main">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Invoice #</th>
          <th>Item</th>
          <th>Seller</th>
          <th>Price</th>
          <th>Payment</th>
          <th>Status</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="purchasesBody">
        <tr><td colspan="8" class="empty-msg">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <h3>Review seller <span id="reviewSellerName"></span></h3>
    <p style="font-size:13px;color:#888;">For your purchase of <strong id="reviewItemTitle"></strong></p>
    <label style="font-size:12px;color:#888;text-transform:uppercase;margin-top:8px;display:block;">Rating</label>
    <div class="stars" id="starPicker">
      <span data-val="1">&#9733;</span>
      <span data-val="2">&#9733;</span>
      <span data-val="3">&#9733;</span>
      <span data-val="4">&#9733;</span>
      <span data-val="5">&#9733;</span>
    </div>
    <label style="font-size:12px;color:#888;text-transform:uppercase;">Comment (optional)</label>
    <textarea id="reviewComment" rows="3" maxlength="500" placeholder="How was your experience?"></textarea>
    <div class="modal-actions">
      <button type="button" class="cancel" onclick="closeReviewModal()">Cancel</button>
      <button type="button" class="submit" onclick="submitReview()">Submit Review</button>
    </div>
  </div>
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  var token = localStorage.getItem('token');
  var user = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token) {
    window.location.href = '/pages/auth/login.html';
  }

  var authLinks = document.getElementById('authLinks');
  var links = '';
  if (user && user.role === 'admin') {
    links += '<a href="/pages/admin/dashboard.html">Admin Dashboard</a>';
  }
  links += '<a href="/pages/seller/dashboard.html">My Listings</a>';
  links += '<a href="#" onclick="logout()">Logout</a>';
  authLinks.innerHTML = links;

  fetch('/api/transactions/purchases', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var tbody = document.getElementById('purchasesBody');
    var txns = data.transactions || [];

    if (txns.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">No purchases yet.</td></tr>';
      return;
    }

    var html = '';
    txns.forEach(function(t) {
      html += '<tr>';
      html += '<td>#' + t.id + '</td>';
      html += '<td>' + t.title + '</td>';
      html += '<td>' + t.seller_username + '</td>';
      html += '<td>$' + parseFloat(t.price).toFixed(2) + '</td>';
      html += '<td>' + t.payment_method + '</td>';
      var statusClass = t.status.toLowerCase();
      html += '<td><span class="badge ' + statusClass + '">' + t.status + '</span></td>';
      html += '<td>' + t.created_at + '</td>';
      html += '<td class="tbl-actions">';
      html += '<a href="/pages/buyer/invoice.html?id=' + t.id + '">Invoice</a>';
      if (t.status === 'COMPLETED') {
        html += '<a class="del" onclick="returnItem(' + t.id + ')">Return</a>';
        if (t.reviewed) {
          html += '<span class="reviewed-tag">Reviewed</span>';
        } else {
          html += '<button class="review-btn" onclick="openReviewModal(' + t.id + ', \'' + (t.seller_username || '').replace(/\'/g, "\\'") + '\', \'' + (t.title || '').replace(/\'/g, "\\'") + '\')">Leave Review</button>';
        }
      }
      html += '</td>';
      html += '</tr>';
    });

    tbody.innerHTML = html;
  });

  function returnItem(txnId) {
    if (!confirm('Are you sure you want to return this item? The refund will be added back to your balance.')) return;

    fetch('/api/transactions/' + txnId + '/return', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        alert(data.error);
      } else {
        alert(data.message);
        window.location.reload();
      }
    });
  }

  var reviewTxnId = null;
  var reviewRating = 0;

  document.querySelectorAll('#starPicker span').forEach(function(star) {
    star.addEventListener('click', function() {
      reviewRating = parseInt(star.getAttribute('data-val'));
      paintStars(reviewRating);
    });
  });

  function paintStars(n) {
    document.querySelectorAll('#starPicker span').forEach(function(s) {
      s.classList.toggle('on', parseInt(s.getAttribute('data-val')) <= n);
    });
  }

  function openReviewModal(txnId, sellerName, title) {
    reviewTxnId = txnId;
    reviewRating = 0;
    paintStars(0);
    document.getElementById('reviewSellerName').textContent = sellerName;
    document.getElementById('reviewItemTitle').textContent = title;
    document.getElementById('reviewComment').value = '';
    document.getElementById('reviewModal').classList.add('active');
  }

  function closeReviewModal() {
    document.getElementById('reviewModal').classList.remove('active');
    reviewTxnId = null;
  }

  function submitReview() {
    if (!reviewRating) { alert('Please select a rating (1-5 stars).'); return; }
    var comment = document.getElementById('reviewComment').value.trim();
    fetch('/api/reviews', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        transaction_id: reviewTxnId,
        rating: reviewRating,
        comment: comment
      })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, body: d }; }); })
    .then(function(res) {
      if (!res.ok) { alert(res.body.error || 'Could not submit review.'); return; }
      closeReviewModal();
      window.location.reload();
    })
    .catch(function() { alert('Network error.'); });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/pages/auth/login.html';
  }
</script>

</body>
</html>
