<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchr - My Offers</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <script src="../../js/auth.js"></script>
  <style>
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }

    .tab:hover { color: #1a1a1a; }

    .tab.active {
      color: #1a1a1a;
      border-bottom-color: #f0e040;
      font-weight: 600;
    }

    .tab .count {
      display: inline-block;
      background: #e0e0e0;
      color: #666;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .tab.active .count {
      background: #1a1a1a;
      color: #f0e040;
    }

    .offer-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .offer-card:hover { border-color: #f0e040; }

    .offer-info { flex: 1; }

    .offer-info h4 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .offer-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #888;
      flex-wrap: wrap;
    }

    .offer-value {
      text-align: right;
      min-width: 140px;
    }

    .offer-value .price {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .offer-value .detail {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .offer-actions {
      display: flex;
      gap: 6px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    @media (max-width: 600px) {
      .offer-card { flex-direction: column; align-items: flex-start; }
      .offer-value { text-align: left; }
    }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/pages/buyer/browse.html">Switchr</a>
  <div class="nav-center">
    <a href="/pages/buyer/browse.html">Browse</a>
    <a href="/pages/offers/offers.html">Offers</a>
    <a href="/pages/buyer/cart.html">Cart <span class="cart-badge"></span></a>
    <a href="/pages/profile.html">Profile</a>
  </div>
  <div class="nav-right" id="authLinks"></div>
</nav>

<div class="header-bar">
  <h1>My Trade Offers</h1>
  <p class="meta">Manage your incoming and outgoing trade offers</p>
</div>

<div class="main">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('incoming')">
      Incoming <span class="count" id="incomingCount">0</span>
    </button>
    <button class="tab" onclick="switchTab('outgoing')">
      Outgoing <span class="count" id="outgoingCount">0</span>
    </button>
  </div>

  <div id="incomingPanel" class="tab-panel active">
    <div id="incomingOffers"><p class="empty-msg">Loading...</p></div>
  </div>

  <div id="outgoingPanel" class="tab-panel">
    <div id="outgoingOffers"><p class="empty-msg">Loading...</p></div>
  </div>

</div>

<footer>
  <a href="/pages/terms.html">Terms</a>
  <a href="/pages/privacy.html">Privacy</a>
  <a href="#">Help</a>
  <p style="margin-top:8px;">Switchr &mdash; Sprint 3 &mdash; CSE 4214</p>
</footer>

<script>
  requireAuth();

  var token = localStorage.getItem('token');
  var authLinks = document.getElementById('authLinks');
  if (isLoggedIn()) {
    var user = getUser();
    var links = '';
    if (user && user.role === 'seller') {
      links += '<a href="/pages/seller/dashboard.html">Seller Dashboard</a>';
    }
    if (user && user.role === 'admin') {
      links += '<a href="/pages/admin/dashboard.html">Admin Dashboard</a>';
    }
    links += '<a href="#" onclick="logout()">Logout</a>';
    authLinks.innerHTML = links;
  }

  // Load trades
  fetch('/api/trades', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var incoming = data.incoming || [];
    var outgoing = data.outgoing || [];

    document.getElementById('incomingCount').textContent = incoming.length;
    document.getElementById('outgoingCount').textContent = outgoing.length;

    renderIncoming(incoming);
    renderOutgoing(outgoing);
  });

  function renderIncoming(trades) {
    var container = document.getElementById('incomingOffers');
    if (trades.length === 0) {
      container.innerHTML = '<p class="empty-msg">No incoming trade offers.</p>';
      return;
    }

    var html = '';
    trades.forEach(function(t) {
      var statusClass = t.status.toLowerCase();
      html += '<div class="offer-card">';
      html += '<div class="offer-info">';
      html += '<h4>Wants your: ' + t.wanted_title + '</h4>';
      html += '<div class="offer-meta">';
      html += '<span>From: <strong>' + t.sender_username + '</strong></span>';
      html += '<span><span class="badge trade">Trade</span></span>';
      html += '<span><span class="badge ' + statusClass + '">' + t.status + '</span></span>';
      html += '<span>' + t.created_at + '</span>';
      html += '</div>';
      html += '</div>';

      html += '<div class="offer-value">';
      html += '<div class="price">' + t.offered_title + '</div>';
      html += '<div class="detail">$' + parseFloat(t.offered_price).toFixed(2) + ' value';
      if (parseFloat(t.cash_offer) > 0) {
        html += ' + $' + parseFloat(t.cash_offer).toFixed(2) + ' cash';
      }
      html += '</div>';
      html += '</div>';

      html += '<div class="offer-actions">';
      if (t.status === 'PENDING') {
        html += '<button class="btn primary small" onclick="acceptTrade(' + t.id + ')">Accept</button>';
        html += '<button class="btn danger small" onclick="rejectTrade(' + t.id + ')">Reject</button>';
      }
      html += '</div>';

      html += '</div>';
    });

    container.innerHTML = html;
  }

  function renderOutgoing(trades) {
    var container = document.getElementById('outgoingOffers');
    if (trades.length === 0) {
      container.innerHTML = '<p class="empty-msg">No outgoing trade offers.</p>';
      return;
    }

    var html = '';
    trades.forEach(function(t) {
      var statusClass = t.status.toLowerCase();
      html += '<div class="offer-card">';
      html += '<div class="offer-info">';
      html += '<h4>You want: ' + t.wanted_title + '</h4>';
      html += '<div class="offer-meta">';
      html += '<span>To: <strong>' + t.receiver_username + '</strong></span>';
      html += '<span><span class="badge trade">Trade</span></span>';
      html += '<span><span class="badge ' + statusClass + '">' + t.status + '</span></span>';
      html += '<span>' + t.created_at + '</span>';
      html += '</div>';
      html += '</div>';

      html += '<div class="offer-value">';
      html += '<div class="price">' + t.offered_title + '</div>';
      html += '<div class="detail">Your offer: $' + parseFloat(t.offered_price).toFixed(2) + ' value';
      if (parseFloat(t.cash_offer) > 0) {
        html += ' + $' + parseFloat(t.cash_offer).toFixed(2) + ' cash';
      }
      html += '</div>';
      html += '</div>';

      html += '<div class="offer-actions">';
      if (t.status === 'PENDING') {
        html += '<button class="btn danger small" onclick="cancelTrade(' + t.id + ')">Cancel</button>';
      }
      html += '</div>';

      html += '</div>';
    });

    container.innerHTML = html;
  }

  function acceptTrade(id) {
    if (!confirm('Accept this trade? Both listings will be swapped.')) return;
    fetch('/api/trades/' + id + '/accept', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      alert(data.message || data.error);
      window.location.reload();
    });
  }

  function rejectTrade(id) {
    if (!confirm('Reject this trade offer?')) return;
    fetch('/api/trades/' + id + '/reject', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      alert(data.message || data.error);
      window.location.reload();
    });
  }

  function cancelTrade(id) {
    if (!confirm('Cancel your trade offer?')) return;
    fetch('/api/trades/' + id + '/cancel', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      alert(data.message || data.error);
      window.location.reload();
    });
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    if (tab === 'incoming') {
      document.querySelector('.tab:nth-child(1)').classList.add('active');
      document.getElementById('incomingPanel').classList.add('active');
    } else {
      document.querySelector('.tab:nth-child(2)').classList.add('active');
      document.getElementById('outgoingPanel').classList.add('active');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/pages/auth/login.html';
  }
</script>

</body>
</html>
