<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchr - Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <style>
    .main { max-width: 420px; }

    .auth-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 32px;
    }

    .auth-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .auth-field { margin-bottom: 18px; }

    .auth-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }

    .auth-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
    }

    .auth-field input:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-login:hover { background: #333; }
    .btn-login:disabled { background: #999; cursor: not-allowed; }

    .auth-banner {
      background: #e6f4ea;
      color: #2d7a3a;
      border: 1px solid #b6e0c2;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .dev-link-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fff8e1;
      border: 1px dashed #f0c040;
      border-radius: 4px;
      font-size: 12px;
      color: #6b5500;
      word-break: break-all;
    }

    .dev-link-box a {
      color: #1a1a1a;
      font-weight: 600;
    }

    .auth-links {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #888;
    }

    .auth-links a {
      color: #1a1a1a;
      font-weight: 500;
      text-decoration: none;
    }

    .auth-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="nav-root"></div>
<script src="/js/nav.js"></script>

<div class="header-bar">
  <h1>Forgot Password</h1>
  <p class="meta">We'll generate a reset link for your account</p>
</div>

<div class="main">

  <div class="auth-card">
    <h2>Reset your password</h2>
    <p class="subtitle">Enter the email associated with your account</p>

    <div class="auth-banner" id="successBanner"></div>
    <div id="devLinkBox"></div>

    <form id="forgotForm" onsubmit="handleSubmit(event)">
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">Send reset link</button>
    </form>

    <div class="auth-links">
      <p><a href="/pages/auth/login.html">&larr; Back to login</a></p>
    </div>
  </div>

</div>

<footer>
  <a href="/pages/terms.html">Terms</a>
  <a href="/pages/privacy.html">Privacy</a>
  <a href="#">Help</a>
  <p style="margin-top:8px;">Switchr &mdash; Sprint 4 &mdash; CSE 4214</p>
</footer>

<script>
  function handleSubmit(event) {
    event.preventDefault();
    var email = document.getElementById('email').value.trim();
    var btn = document.getElementById('submitBtn');
    var banner = document.getElementById('successBanner');
    var devBox = document.getElementById('devLinkBox');

    btn.disabled = true;
    btn.textContent = 'Working...';
    devBox.innerHTML = '';

    fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      banner.textContent = data.message || 'If that email is registered, a reset link has been generated.';
      banner.style.display = 'block';

      if (data.reset_link) {
        devBox.innerHTML = '<div class="dev-link-box"><strong>Dev mode:</strong> '
          + 'No email is sent in this build. Use this reset link directly:<br><br>'
          + '<a href="' + data.reset_link + '">' + data.reset_link + '</a></div>';
      }

      btn.disabled = false;
      btn.textContent = 'Send reset link';
    })
    .catch(function() {
      banner.textContent = 'Network error. Check that the backend is running.';
      banner.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    });
  }
</script>

</body>
</html>
