<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/shared.css">
  <style>
    .main { max-width: 700px; }
    .header-bar h1 { font-size: 22px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .required { margin-left: 2px; }

    input[type=text],
    input[type=number],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    textarea { resize: vertical; }

    .photo-box {
      border: 2px dashed #ccc;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #fafaf8;
    }

    .photo-box:hover { border-color: #1a1a1a; }
    .photo-box input { display: none; }
    .photo-box p { font-size: 13px; color: #888; margin-bottom: 6px; }
    .photo-box small { font-size: 11px; color: #bbb; }

    .btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-submit {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }

    .btn-cancel { font-size: 13px; color: #888; text-decoration: none; }
    .btn-cancel:hover { color: #1a1a1a; }

    footer { margin-top: 40px; }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/pages/seller/dashboard.html">Switchr</a>
  <div class="nav-center">
    <a href="/pages/buyer/browse.html">Browse</a>
    <a href="/pages/seller/dashboard.html">My Listings</a>
    <a href="/pages/profile.html">Profile</a>
  </div>
  <div class="nav-right">
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="header-bar">
  <h1>Create a New Listing</h1>
  <p class="breadcrumb">
    <a href="/pages/seller/dashboard.html">Seller Home</a> &rsaquo; Create Listing
  </p>
</div>

<div class="main">
  <div class="form-card">

    <div class="error-banner" id="errorBanner"></div>
    <div class="success-banner" id="successBanner"></div>

    <p style="font-size:13px; color:#888; margin-bottom:24px;">
      Fields marked <span style="color:#c62828;">*</span> are required
    </p>

    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" maxlength="100"
             placeholder="e.g., iPhone 13 Pro 256GB Space Gray"
             oninput="updateCount(this, 'titleCount', 100)">
      <div class="char-count" id="titleCount">0 / 100</div>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" name="description" rows="5"
                placeholder="Describe the item. Include any defects, accessories, or other relevant details."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category <span class="required">*</span></label>
        <select id="category" name="category">
          <option value="">-- Select --</option>
          <option>Phones</option>
          <option>Laptops</option>
          <option>Tablets</option>
          <option>Headphones</option>
          <option>Chargers</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Price ($) <span class="required">*</span></label>
        <input type="number" id="price" name="price" placeholder="e.g., 450" min="0" step="0.01">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="condition">Condition <span class="required">*</span></label>
        <select id="condition" name="condition">
          <option value="">-- Select --</option>
          <option value="NEW">NEW</option>
          <option value="LIKE_NEW">LIKE_NEW</option>
          <option value="GOOD">GOOD</option>
          <option value="FAIR">FAIR</option>
          <option value="POOR">POOR</option>
        </select>
      </div>

      <div class="form-group">
        <label for="listingType">Listing Type <span class="required">*</span></label>
        <select id="listingType" name="listingType">
          <option value="">-- Select --</option>
          <option value="SALE">SALE - selling for cash</option>
          <option value="TRADE">TRADE - swap only</option>
          <option value="BOTH">BOTH - open to either</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Photos</label>
      <div class="photo-box" onclick="document.getElementById('photoUrls').click()">
        <p>Click to upload photos</p>
        <small>Multiple images supported (backend connection coming)</small>
        <input type="file" id="photoUrls" name="photoUrls" accept="image/*" multiple>
      </div>
      <div class="hint">At least one photo recommended (REQ-25)</div>
    </div>

    <div class="btn-row">
      <a class="btn-cancel" href="/pages/seller/dashboard.html">&larr; Cancel</a>
      <button class="btn-submit" id="submitBtn" onclick="submitListing()">Submit Listing</button>
    </div>

  </div>
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  // check auth on load
  var token = localStorage.getItem('token');
  var user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) {
    window.location.href = '/pages/auth/login.html';
  }

  // check account approval
  if (user.status === 'pending') {
    showError('Your account is pending admin approval. You cannot create listings yet.');
    document.getElementById('submitBtn').disabled = true;
  } else if (user.status === 'denied') {
    showError('Your account has been denied. You cannot create listings.');
    document.getElementById('submitBtn').disabled = true;
  }

  function updateCount(input, countId, max) {
    var len = input.value.length;
    var el = document.getElementById(countId);
    el.textContent = len + ' / ' + max;
    if (len > max * 0.85) {
      el.classList.add('warn');
    } else {
      el.classList.remove('warn');
    }
  }

  function showError(msg) {
    var el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successBanner').style.display = 'none';
  }

  function showSuccess(msg) {
    var el = document.getElementById('successBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorBanner').style.display = 'none';
  }

  function submitListing() {
    var title = document.getElementById('title').value.trim();
    var description = document.getElementById('description').value.trim();
    var category = document.getElementById('category').value;
    var price = document.getElementById('price').value;
    var condition = document.getElementById('condition').value;
    var listingType = document.getElementById('listingType').value;

    // front end validation before hitting the API
    if (!title || !description || !category || !price || !condition || !listingType) {
      showError('Please fill in all required fields.');
      return;
    }

    if (title.length > 100) {
      showError('Title must be 100 characters or less.');
      return;
    }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    fetch('/api/listings', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        title: title,
        description: description,
        category: category,
        price: parseFloat(price),
        condition: condition,
        listingType: listingType
      })
    })
    .then(function(res) {
      return res.json().then(function(data) {
        return { status: res.status, data: data };
      });
    })
    .then(function(result) {
      if (result.status === 201) {
        showSuccess('Listing submitted for approval! Redirecting...');
        setTimeout(function() {
          window.location.href = '/pages/seller/dashboard.html';
        }, 1200);
      } else {
        showError(result.data.error || 'Something went wrong. Try again.');
        btn.disabled = false;
        btn.textContent = 'Submit Listing';
      }
    })
    .catch(function() {
      showError('Network error. Check that the backend is running.');
      btn.disabled = false;
      btn.textContent = 'Submit Listing';
    });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/pages/auth/login.html';
  }
</script>

</body>
</html>
