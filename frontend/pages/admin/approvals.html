<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pending Approvals - Switchr Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="../../js/auth.js"></script>
    <script>
        (function() {
            var token = localStorage.getItem('token');
            var user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || !user || user.role !== 'admin') {
                document.documentElement.style.visibility = 'hidden';
                window.location.href = '/pages/auth/login.html';
            }
        })();
    </script>
    <style>
        body { visibility: hidden; }
        .main { max-width: 1000px; }

        .listing-review {
            margin-bottom: 24px;
        }

        .listing-review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .listing-review-header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
        }

        .listing-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .meta-row {
            font-size: 13px;
        }

        .meta-row span:first-child {
            color: #888;
            margin-right: 6px;
        }

        .description-box {
            background: #f7f6f3;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            color: #444;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .seller-box {
            background: #f7f6f3;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .seller-box h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .action-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-approve {
            background: #2d7a3a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        .btn-deny {
            background: #c62828;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        .btn-approve:hover { background: #1b5e20; }
        .btn-deny:hover { background: #b71c1c; }

        .denial-reason {
            flex: 1;
        }

        .denial-reason textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            resize: vertical;
        }

        .denial-reason label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .photo-preview {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .photo-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e8e8e8;
        }

        .status-msg {
            display: none;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="nav-root"></div>
<script src="/js/nav.js"></script>

<div class="header-bar">
  <h1>Pending Listing Approvals</h1>
  <p class="breadcrumb"><a href="/pages/admin/dashboard.html">&larr; Back to Dashboard</a></p>
</div>

<div class="main">

  <div class="status-msg" id="statusMessage"></div>

  <div id="pendingList">
    <p style="color:#aaa; text-align:center; padding:40px;">Loading pending listings...</p>
  </div>

</div>

<footer>Switchr &mdash; Sprint 4 &mdash; CSE 4214</footer>

<script>
    if (!requireAdmin()) {
        // redirected
    } else {
        document.body.style.visibility = 'visible';
        var user = getUser();
        var authLinks = document.getElementById('authLinks');
        authLinks.innerHTML = '<span style="color:#ccc; font-size:13px;">Admin: ' + user.email + '</span> <a href="#" onclick="logout()" style="color:#ccc; font-size:13px; margin-left:12px;">Logout</a>';
        loadPending();
    }

    function showStatus(msg, isError) {
        var el = document.getElementById('statusMessage');
        el.textContent = msg;
        el.style.display = 'block';
        el.style.background = isError ? '#fce4ec' : '#e6f4ea';
        el.style.color = isError ? '#c62828' : '#2d7a3a';
        el.style.border = '1px solid ' + (isError ? '#ef9a9a' : '#a5d6a7');
        setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    function loadPending() {
        authFetch('/admin/listings?status=PENDING_APPROVAL').then(function(res) {
            if (!res) return;
            return res.json();
        }).then(function(data) {
            if (!data) return;
            var container = document.getElementById('pendingList');
            var listings = data.listings || [];

            if (listings.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center; padding:40px; color:#aaa;">No pending listings to review.</div>';
                return;
            }

            var html = '';
            listings.forEach(function(l) {
                html += '<div class="card listing-review" id="listing-' + l.id + '">';

                html += '<div class="listing-review-header">';
                html += '<h3>' + l.title + '</h3>';
                html += '<span style="font-family:Syne,sans-serif; font-size:18px; font-weight:700;">$' + parseFloat(l.price).toFixed(2) + '</span>';
                html += '</div>';

                // Photos
                if (l.photo_urls && l.photo_urls.length > 0) {
                    html += '<div class="photo-preview">';
                    l.photo_urls.forEach(function(url) {
                        html += '<img src="' + url + '" alt="listing photo">';
                    });
                    html += '</div>';
                }

                // Meta
                html += '<div class="listing-meta">';
                html += '<div class="meta-row"><span>Category:</span>' + l.category + '</div>';
                html += '<div class="meta-row"><span>Condition:</span>' + l.condition + '</div>';
                html += '<div class="meta-row"><span>Type:</span>' + l.listing_type + '</div>';
                html += '<div class="meta-row"><span>Created:</span>' + l.created_at + '</div>';
                html += '</div>';

                // Description
                html += '<div class="description-box">' + l.description + '</div>';

                // Seller
                html += '<div class="seller-box">';
                html += '<h4>Seller Info</h4>';
                html += '<div style="font-size:13px;">Username: <strong>' + l.seller_username + '</strong></div>';
                html += '</div>';

                // Actions
                html += '<div class="action-row">';
                html += '<button class="btn-approve" onclick="approveListing(' + l.id + ')">Approve</button>';
                html += '<button class="btn-deny" onclick="denyListing(' + l.id + ')">Deny</button>';
                html += '<div class="denial-reason">';
                html += '<label>Reason (required if denying)</label>';
                html += '<textarea id="reason-' + l.id + '" rows="2" placeholder="Enter reason for denial..."></textarea>';
                html += '</div>';
                html += '</div>';

                html += '</div>';
            });

            container.innerHTML = html;
        });
    }

    function approveListing(id) {
        authFetch('/admin/listings/' + id + '/approve', { method: 'PUT' })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.error) { showStatus(data.error, true); }
            else {
                showStatus('Listing approved!', false);
                var el = document.getElementById('listing-' + id);
                if (el) el.remove();
            }
        });
    }

    function denyListing(id) {
        var reason = document.getElementById('reason-' + id).value.trim();
        if (!reason) {
            showStatus('Please enter a denial reason.', true);
            return;
        }
        authFetch('/admin/listings/' + id + '/deny', {
            method: 'PUT',
            body: JSON.stringify({ reason: reason })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.error) { showStatus(data.error, true); }
            else {
                showStatus('Listing denied.', false);
                var el = document.getElementById('listing-' + id);
                if (el) el.remove();
            }
        });
    }
</script>

</body>
</html>
