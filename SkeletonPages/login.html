<!DOCTYPE html>
<html>
<head>
    <title>Switchr - Login</title>
    <script src="js/auth.js"></script>
</head>

<body>

    <!-- Header / Navigation -->
    <header>
        <h2>Switchr</h2>

        <nav>
            <a href="Buyer/buyer.html">Browse</a> |
            <a href="#">About</a> |
            <a href="#">Help</a>
        </nav>

        <div>
            <a href="login.html">Login</a> |
            <a href="register.html">Sign Up</a>
        </div>

        <hr>
    </header>

    <!-- Main Content -->
    <main>

        <h1>Login</h1>

        <section style="border: 1px solid black; padding: 20px; width: 350px;">

            <form id="loginForm" onsubmit="handleLogin(event)">

                <label><strong>Email</strong></label><br>
                <input type="email" id="email" placeholder="Enter email" style="width: 100%; padding: 5px;" required>

                <br><br>

                <label><strong>Password</strong></label><br>
                <input type="password" id="password" placeholder="Enter password" style="width: 100%; padding: 5px;" required>

                <br><br>

                <p id="errorMessage" style="color: red; display: none;"></p>

                <button type="submit" style="width: 100%; padding: 8px;">Login</button>

            </form>

            <br>

            <p><a href="#">Forgot Password?</a></p>

            <hr>

            <p>Don't have an account? <a href="register.html">Sign Up</a></p>

        </section>

    </main>

    <footer style="margin-top: 20px; border-top: 1px solid black; padding: 10px;">

        <p>
            <a href="terms.html">Terms</a> |
            <a href="privacy.html">Privacy</a> |
            <a href="#">Help</a>
        </p>

        <p style="font-size: 12px;">
            Switchr Marketplace - Skeleton Version
        </p>

    </footer>

    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.style.display = 'none';

            const result = await login(email, password);

            if (result.success) {
                if (result.user.role === 'admin') {
                    window.location.href = '/Admin/admin.html';
                } else if (result.user.status === 'denied') {
                    errorMessage.textContent = 'Your account has been denied.';
                    errorMessage.style.display = 'block';
                } else if (result.user.status === 'pending') {
                    errorMessage.style.color = 'orange';
                    errorMessage.textContent = 'Your account is pending admin approval. You can browse listings but cannot buy, sell, or trade yet.';
                    errorMessage.style.display = 'block';
                } else if (result.user.role === 'seller') {
                    window.location.href = '/Seller/Seller_Home.html';
                } else {
                    window.location.href = '/';
                }
            } else {
                errorMessage.textContent = result.error;
                errorMessage.style.display = 'block';
            }
        }
    </script>

</body>

</html>
