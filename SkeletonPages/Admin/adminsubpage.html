<!DOCTYPE html>
<html>
<head>
    <title>Switchr Admin - Pending Approvals</title>
    <script src="../js/auth.js"></script>
</head>

<body>

    <!-- Header / Navigation -->
    <header>
        <h2>Switchr Admin</h2>

        <nav>
            <a href="admin.html">Dashboard</a> |
            <a href="adminsubpage.html">Pending Approvals</a>
        </nav>

        <div id="authLinks">
            <span>Logged in as: admin</span> |
            <a href="#" onclick="logout()">Logout</a>
        </div>

        <hr>
    </header>

    <!-- Main Content -->
    <main>

        <h1>Pending Listing Approvals</h1>

        <p><a href="admin.html">&lt; Back to Dashboard</a></p>

        <br>

        <p id="statusMessage" style="display: none; padding: 10px; margin-bottom: 10px;"></p>

        <div id="pendingList">
            <p>Loading pending listings...</p>
        </div>

    </main>

    <footer style="margin-top: 20px; border-top: 1px solid black; padding: 10px;">
        <p>
            <a href="#">Terms</a> |
            <a href="#">Privacy</a> |
            <a href="#">Help</a>
        </p>
        <p style="font-size: 12px;">
            Switchr Admin Panel - Skeleton Version
        </p>
    </footer>

    <script>
        // Auth gate: admin only
        if (!requireAdmin()) {
            // redirected away
        } else {
            var user = getUser();

            var authLinks = document.getElementById('authLinks');
            authLinks.innerHTML = '<span>Logged in as: ' + user.email + '</span> | <a href="#" onclick="logout()">Logout</a>';

            loadPending();
        }

        function showStatus(msg, isError) {
            var el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = isError ? '#fce4ec' : '#e6f4ea';
            el.style.color = isError ? '#c62828' : '#2d7a3a';
            el.style.border = '1px solid ' + (isError ? '#ef9a9a' : '#a5d6a7');
        }

        function loadPending() {
            authFetch('/admin/listings?status=PENDING_APPROVAL').then(function(res) {
                if (!res) return;
                return res.json();
            }).then(function(data) {
                if (!data) return;
                var container = document.getElementById('pendingList');
                var listings = data.listings || [];

                if (listings.length === 0) {
                    container.innerHTML = '<p>No pending listings to review.</p>';
                    return;
                }

                var html = '';
                listings.forEach(function(l) {
                    html += '<section style="border: 1px solid black; padding: 10px; margin-bottom: 20px;" id="listing-' + l.id + '">';
                    html += '<h3>' + l.title + '</h3>';

                    html += '<div style="display: flex; gap: 20px;">';

                    // Details
                    html += '<div style="flex: 1;">';
                    html += '<p><strong>Category:</strong> ' + l.category + '</p>';
                    html += '<p><strong>Condition:</strong> ' + l.condition + '</p>';
                    html += '<p><strong>Price:</strong> $' + parseFloat(l.price).toFixed(2) + '</p>';
                    html += '<p><strong>Type:</strong> ' + l.listing_type + '</p>';
                    html += '<p><strong>Created:</strong> ' + l.created_at + '</p>';
                    html += '<br>';
                    html += '<p><strong>Description:</strong></p>';
                    html += '<p style="border: 1px solid gray; padding: 10px;">' + l.description + '</p>';
                    html += '</div>';

                    // Seller info
                    html += '<div style="width: 200px; border: 1px solid gray; padding: 10px;">';
                    html += '<h4 style="margin: 0;">Seller Info</h4>';
                    html += '<p>Username: ' + l.seller_username + '</p>';
                    html += '<p>Seller ID: ' + l.seller_id + '</p>';
                    html += '</div>';

                    html += '</div>';

                    html += '<hr>';

                    // Admin actions
                    html += '<div>';
                    html += '<h4>Admin Actions</h4>';
                    html += '<button onclick="approveListing(' + l.id + ')" style="padding: 8px 16px; margin-right: 10px;">Approve</button>';
                    html += '<button onclick="denyListing(' + l.id + ')" style="padding: 8px 16px; margin-right: 10px;">Deny</button>';
                    html += '<br><br>';
                    html += '<label><strong>Reason (required if denying):</strong></label><br>';
                    html += '<textarea id="reason-' + l.id + '" rows="3" cols="50" placeholder="Enter reason for denial..."></textarea>';
                    html += '</div>';

                    html += '</section>';
                });

                container.innerHTML = html;
            });
        }

        function approveListing(id) {
            authFetch('/admin/listings/' + id + '/approve', {
                method: 'PUT'
            }).then(function(res) {
                return res.json();
            }).then(function(data) {
                if (data.error) {
                    showStatus(data.error, true);
                } else {
                    showStatus('Listing #' + id + ' approved!', false);
                    // Remove from page
                    var el = document.getElementById('listing-' + id);
                    if (el) el.remove();
                }
            });
        }

        function denyListing(id) {
            var reason = document.getElementById('reason-' + id).value.trim();
            if (!reason) {
                showStatus('Please enter a denial reason.', true);
                return;
            }

            authFetch('/admin/listings/' + id + '/deny', {
                method: 'PUT',
                body: JSON.stringify({ reason: reason })
            }).then(function(res) {
                return res.json();
            }).then(function(data) {
                if (data.error) {
                    showStatus(data.error, true);
                } else {
                    showStatus('Listing #' + id + ' denied.', false);
                    var el = document.getElementById('listing-' + id);
                    if (el) el.remove();
                }
            });
        }
    </script>

</body>

</html>
