<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Listing - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/shared.css">
  <style>
    .main { max-width: 700px; }
    .header-bar h1 { font-size: 22px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .required { margin-left: 2px; }

    input[type=text],
    input[type=number],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    textarea { resize: vertical; }

    .photo-box {
      border: 2px dashed #ccc;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #fafaf8;
    }

    .photo-box:hover { border-color: #1a1a1a; }
    .photo-box input { display: none; }
    .photo-box p { font-size: 13px; color: #888; margin-bottom: 6px; }
    .photo-box small { font-size: 11px; color: #bbb; }

    .btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-submit {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }

    .btn-cancel { font-size: 13px; color: #888; text-decoration: none; }
    .btn-cancel:hover { color: #1a1a1a; }

    footer { margin-top: 40px; }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/SkeletonPages/Seller/Seller_Home.html">Switchr</a>
  <div class="nav-center">
    <a href="/Buyer/buyer.html">Browse</a>
    <a href="/SkeletonPages/Seller/Seller_Home.html">My Listings</a>
    <a href="/SkeletonPages/profile.html">Profile</a>
  </div>
  <div class="nav-right">
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="header-bar">
  <h1>Edit Listing</h1>
  <p class="breadcrumb">
    <a href="/SkeletonPages/Seller/Seller_Home.html">Seller Home</a> &rsaquo; Edit Listing
  </p>
</div>

<div class="main">
  <div class="form-card">

    <div class="error-banner" id="errorBanner"></div>
    <div class="success-banner" id="successBanner"></div>
    <div class="warning-banner" id="warningBanner"></div>

    <p id="statusInfo" style="font-size:13px; color:#888; margin-bottom:24px;"></p>

    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" maxlength="100"
             oninput="updateCount(this, 'titleCount', 100)">
      <div class="char-count" id="titleCount">0 / 100</div>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" name="description" rows="5"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category <span class="required">*</span></label>
        <select id="category" name="category">
          <option value="">-- Select --</option>
          <option>Phones</option>
          <option>Laptops</option>
          <option>Tablets</option>
          <option>Headphones</option>
          <option>Chargers</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Price ($) <span class="required">*</span></label>
        <input type="number" id="price" name="price" min="0" step="0.01">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="condition">Condition <span class="required">*</span></label>
        <select id="condition" name="condition">
          <option value="">-- Select --</option>
          <option value="NEW">NEW</option>
          <option value="LIKE_NEW">LIKE_NEW</option>
          <option value="GOOD">GOOD</option>
          <option value="FAIR">FAIR</option>
          <option value="POOR">POOR</option>
        </select>
      </div>

      <div class="form-group">
        <label for="listingType">Listing Type <span class="required">*</span></label>
        <select id="listingType" name="listingType">
          <option value="">-- Select --</option>
          <option value="SALE">SALE - selling for cash</option>
          <option value="TRADE">TRADE - swap only</option>
          <option value="BOTH">BOTH - open to either</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Photos</label>
      <div class="photo-box" onclick="document.getElementById('photoUrls').click()">
        <p>Click to upload photos</p>
        <small>Multiple images supported (backend connection coming)</small>
        <input type="file" id="photoUrls" name="photoUrls" accept="image/*" multiple>
      </div>
    </div>

    <div class="btn-row">
      <a class="btn-cancel" href="/SkeletonPages/Seller/Seller_Home.html">&larr; Cancel</a>
      <button class="btn-submit" id="submitBtn" onclick="saveListing()">Save Changes</button>
    </div>

  </div>
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  var token = localStorage.getItem('token');
  if (!token) {
    window.location.href = '/SkeletonPages/login.html';
  }

  // Get listing ID from URL query param
  var params = new URLSearchParams(window.location.search);
  var listingId = params.get('id');

  if (!listingId) {
    window.location.href = '/SkeletonPages/Seller/Seller_Home.html';
  }

  var currentStatus = '';

  // Load existing listing data
  fetch('/api/listings/' + listingId, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) {
    if (res.status === 401) {
      window.location.href = '/SkeletonPages/login.html';
      return;
    }
    return res.json();
  })
  .then(function(data) {
    if (!data || data.error) {
      showError(data ? data.error : 'Could not load listing.');
      return;
    }

    var l = data.listing;
    currentStatus = l.status;

    document.getElementById('title').value = l.title;
    document.getElementById('description').value = l.description;
    document.getElementById('category').value = l.category;
    document.getElementById('price').value = parseFloat(l.price);
    document.getElementById('condition').value = l.condition;
    document.getElementById('listingType').value = l.listing_type;

    updateCount(document.getElementById('title'), 'titleCount', 100);

    document.getElementById('statusInfo').textContent = 'Current status: ' + l.status;

    if (l.status === 'ACTIVE') {
      var warn = document.getElementById('warningBanner');
      warn.textContent = 'This listing is ACTIVE. Changing the title or description will send it back for admin approval.';
      warn.style.display = 'block';
    }
  })
  .catch(function() {
    showError('Could not load listing.');
  });

  function updateCount(input, countId, max) {
    var len = input.value.length;
    var el = document.getElementById(countId);
    el.textContent = len + ' / ' + max;
    if (len > max * 0.85) {
      el.classList.add('warn');
    } else {
      el.classList.remove('warn');
    }
  }

  function showError(msg) {
    var el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successBanner').style.display = 'none';
  }

  function showSuccess(msg) {
    var el = document.getElementById('successBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorBanner').style.display = 'none';
  }

  function saveListing() {
    var title = document.getElementById('title').value.trim();
    var description = document.getElementById('description').value.trim();
    var category = document.getElementById('category').value;
    var price = document.getElementById('price').value;
    var condition = document.getElementById('condition').value;
    var listingType = document.getElementById('listingType').value;

    if (!title || !description || !category || !price || !condition || !listingType) {
      showError('Please fill in all required fields.');
      return;
    }

    if (title.length > 100) {
      showError('Title must be 100 characters or less.');
      return;
    }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    fetch('/api/listings/' + listingId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        title: title,
        description: description,
        category: category,
        price: parseFloat(price),
        condition: condition,
        listingType: listingType
      })
    })
    .then(function(res) {
      return res.json().then(function(data) {
        return { status: res.status, data: data };
      });
    })
    .then(function(result) {
      if (result.status === 200) {
        showSuccess(result.data.message + ' Redirecting...');
        setTimeout(function() {
          window.location.href = '/SkeletonPages/Seller/Seller_Home.html';
        }, 1200);
      } else {
        showError(result.data.error || 'Something went wrong.');
        btn.disabled = false;
        btn.textContent = 'Save Changes';
      }
    })
    .catch(function() {
      showError('Network error. Check that the backend is running.');
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/SkeletonPages/login.html';
  }
</script>

</body>
</html>
