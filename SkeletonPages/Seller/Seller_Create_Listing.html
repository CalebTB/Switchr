<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f6f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    nav {
      background: #1a1a1a;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .brand {
      font-family: 'Syne', sans-serif;
      color: #f0e040;
      font-size: 22px;
      text-decoration: none;
      letter-spacing: 1px;
    }

    nav .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    nav .nav-links a:hover { color: white; }

    .header-bar {
      background: #fff;
      border-bottom: 3px solid #f0e040;
      padding: 20px 32px;
    }

    .header-bar h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
    }

    .breadcrumb {
      font-size: 13px;
      color: #999;
      margin-top: 4px;
    }

    .breadcrumb a {
      color: #666;
      text-decoration: none;
    }

    .breadcrumb a:hover { color: #1a1a1a; }

    .main {
      max-width: 700px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .form-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 32px;
    }

    .error-banner {
      background: #fce4ec;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 22px;
      font-size: 13px;
      display: none;
    }

    .success-banner {
      background: #e6f4ea;
      color: #2d7a3a;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 22px;
      font-size: 13px;
      display: none;
    }

    .form-group { margin-bottom: 20px; }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .form-group { flex: 1; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .required { color: #c62828; margin-left: 2px; }

    input[type=text],
    input[type=number],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1a1a1a;
      background: white;
    }

    textarea { resize: vertical; }

    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .char-count {
      font-size: 11px;
      color: #aaa;
      text-align: right;
      margin-top: 3px;
    }

    .char-count.warn { color: #e65100; }

    .photo-box {
      border: 2px dashed #ccc;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #fafaf8;
    }

    .photo-box:hover { border-color: #1a1a1a; }
    .photo-box input { display: none; }

    .photo-box p {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    .photo-box small { font-size: 11px; color: #bbb; }

    .btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-submit {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-submit:hover { background: #333; }
    .btn-submit:disabled { background: #999; cursor: not-allowed; }

    .btn-cancel {
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }

    .btn-cancel:hover { color: #1a1a1a; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/SkeletonPages/Seller/Seller_Home.html">Switchr</a>
  <div class="nav-links">
    <a href="/SkeletonPages/Seller/Seller_Home.html">Home</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="header-bar">
  <h1>Create a New Listing</h1>
  <p class="breadcrumb">
    <a href="/SkeletonPages/Seller/Seller_Home.html">Seller Home</a> &rsaquo; Create Listing
  </p>
</div>

<div class="main">
  <div class="form-card">

    <div class="error-banner" id="errorBanner"></div>
    <div class="success-banner" id="successBanner"></div>

    <p style="font-size:13px; color:#888; margin-bottom:24px;">
      Fields marked <span style="color:#c62828;">*</span> are required
    </p>

    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" maxlength="100"
             placeholder="e.g., iPhone 13 Pro 256GB Space Gray"
             oninput="updateCount(this, 'titleCount', 100)">
      <div class="char-count" id="titleCount">0 / 100</div>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" name="description" rows="5"
                placeholder="Describe the item. Include any defects, accessories, or other relevant details."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category <span class="required">*</span></label>
        <select id="category" name="category">
          <option value="">-- Select --</option>
          <option>Phones</option>
          <option>Laptops</option>
          <option>Tablets</option>
          <option>Headphones</option>
          <option>Chargers</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Price ($) <span class="required">*</span></label>
        <input type="number" id="price" name="price" placeholder="e.g., 450" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label for="quantity">Quantity <span class="required">*</span></label>
        <input type="number" id="quantity" name="quantity" placeholder="e.g., 1" min="1" step="1" value="1">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="condition">Condition <span class="required">*</span></label>
        <select id="condition" name="condition">
          <option value="">-- Select --</option>
          <option value="NEW">NEW</option>
          <option value="LIKE_NEW">LIKE_NEW</option>
          <option value="GOOD">GOOD</option>
          <option value="FAIR">FAIR</option>
          <option value="POOR">POOR</option>
        </select>
      </div>

      <div class="form-group">
        <label for="listingType">Listing Type <span class="required">*</span></label>
        <select id="listingType" name="listingType">
          <option value="">-- Select --</option>
          <option value="SALE">SALE - selling for cash</option>
          <option value="TRADE">TRADE - swap only</option>
          <option value="BOTH">BOTH - open to either</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Photos</label>
      <div class="photo-box" onclick="document.getElementById('photos').click()">
        <div id="photoPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;"></div>
        <p>Click to upload photos</p>
        <small>Multiple images supported</small>
        <input type="file" id="photos" name="photos" accept="image/*" multiple onchange="previewPhotos(this)">
      </div>
      <div class="hint">At least one photo recommended (REQ-25)</div>
    </div>

    <div class="btn-row">
      <a class="btn-cancel" href="/SkeletonPages/Seller/Seller_Home.html">&larr; Cancel</a>
      <button class="btn-submit" id="submitBtn" onclick="submitListing()">Submit Listing</button>
    </div>

  </div>
</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  // check auth on load
  var token = localStorage.getItem('token');
  var user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) {
    window.location.href = '/SkeletonPages/login.html';
  }

  // check account approval
  if (user.status === 'pending') {
    showError('Your account is pending admin approval. You cannot create listings yet.');
    document.getElementById('submitBtn').disabled = true;
  } else if (user.status === 'denied') {
    showError('Your account has been denied. You cannot create listings.');
    document.getElementById('submitBtn').disabled = true;
  }

  function updateCount(input, countId, max) {
    var len = input.value.length;
    var el = document.getElementById(countId);
    el.textContent = len + ' / ' + max;
    if (len > max * 0.85) {
      el.classList.add('warn');
    } else {
      el.classList.remove('warn');
    }
  }

  function previewPhotos(input) {
    var preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    Array.from(input.files).forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = document.createElement('img');
            img.src = e.target.result;
            img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:4px;border:1px solid #ddd;';
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
  }

  function showError(msg) {
    var el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successBanner').style.display = 'none';
  }

  function showSuccess(msg) {
    var el = document.getElementById('successBanner');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorBanner').style.display = 'none';
  }

  function submitListing() {
    var formData = new FormData();
    formData.append('title', document.getElementById('title').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('category', document.getElementById('category').value);
    formData.append('price', document.getElementById('price').value);
    formData.append('quantity', document.getElementById('quantity').value);
    formData.append('condition', document.getElementById('condition').value);
    formData.append('listingType', document.getElementById('listingType').value);

    var photos = document.getElementById('photos').files;
    for (var i = 0; i < photos.length; i++) {
        formData.append('photos', photos[i]);
    }

    var token = localStorage.getItem('token');
    fetch('/api/listings', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
    })
    .then(r => r.json())
    .then(data => {
        if (data.listing) {
            alert('Listing submitted for approval!');
            window.location.href = '/Seller/Seller_Home.html';
        } else {
            alert(data.error || 'Something went wrong.');
        }
    })
    .catch(() => alert('Could not connect to server.'));
}

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/SkeletonPages/login.html';
  }
</script>

</body>
</html>
