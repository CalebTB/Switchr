<!DOCTYPE html>
<html>
<head>
    <title>Switchr - Sign Up</title>
    <script src="js/auth.js"></script>
</head>

<body>

    <!-- Header / Navigation -->
    <header>
        <h2>Switchr</h2>

        <nav>
            <a href="Buyer/buyer.html">Browse</a> |
            <a href="#">About</a> |
            <a href="#">Help</a>
        </nav>

        <div>
            <a href="login.html">Login</a> |
            <a href="register.html">Sign Up</a>
        </div>

        <hr>
    </header>

    <!-- Main Content -->
    <main>

        <h1>Sign Up</h1>

        <section style="border: 1px solid black; padding: 20px; width: 350px;">

            <form id="registerForm" onsubmit="handleRegister(event)">

                <label><strong>Email</strong></label><br>
                <input type="email" id="email" placeholder="Enter email" style="width: 100%; padding: 5px;" required>

                <br><br>

                <label><strong>Username</strong></label><br>
                <input type="text" id="username" placeholder="Enter username" style="width: 100%; padding: 5px;" required>

                <br><br>

                <label><strong>Password</strong></label><br>
                <input type="password" id="password" placeholder="Enter password" style="width: 100%; padding: 5px;" required>

                <br><br>

                <label><strong>Confirm Password</strong></label><br>
                <input type="password" id="confirmPassword" placeholder="Confirm password" style="width: 100%; padding: 5px;" required>

                <br><br>

                <label><strong>Role</strong></label><br>
                <select id="role" style="width: 100%; padding: 5px;" required>
                    <option value="user">Buyer</option>
                    <option value="seller">Seller</option>
                    <option value="admin">Admin</option>
                </select>

                <br><br>

                <p id="errorMessage" style="color: red; display: none;"></p>
                <p id="successMessage" style="color: green; display: none;"></p>

                <button type="submit" style="width: 100%; padding: 8px;">Sign Up</button>

            </form>

            <hr>

            <p>Already have an account? <a href="login.html">Login</a></p>

        </section>

    </main>

    <footer style="margin-top: 20px; border-top: 1px solid black; padding: 10px;">

        <p>
            <a href="terms.html">Terms</a> |
            <a href="privacy.html">Privacy</a> |
            <a href="#">Help</a>
        </p>

        <p style="font-size: 12px;">
            Switchr Marketplace - Skeleton Version
        </p>

    </footer>

    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();

        async function handleRegister(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.style.display = 'none';

            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorMessage.textContent = 'Password must be at least 8 characters';
                errorMessage.style.display = 'block';
                return;
            }

            const role = document.getElementById('role').value;

            const result = await register(email, username, password, role);

            if (result.success) {
                if (result.user.role === 'admin') {
                    window.location.href = '/Admin/admin.html';
                } else {
                    // Buyer/Seller accounts are pending approval
                    document.getElementById('successMessage').textContent = 'Account created! Your account is pending admin approval. You can browse listings but cannot buy, sell, or trade until approved.';
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('registerForm').style.display = 'none';
                }
            } else {
                errorMessage.textContent = result.error;
                errorMessage.style.display = 'block';
            }
        }
    </script>

</body>

</html>
