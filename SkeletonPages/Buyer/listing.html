<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Details - Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <script src="../js/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f6f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    nav {
      background: #1a1a1a;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .brand {
      font-family: 'Syne', sans-serif;
      color: #f0e040;
      font-size: 22px;
      text-decoration: none;
      letter-spacing: 1px;
    }

    nav .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    nav .nav-links a:hover { color: white; }

    .header-bar {
      background: #fff;
      border-bottom: 3px solid #f0e040;
      padding: 16px 32px;
    }

    .breadcrumb {
      font-size: 13px;
      color: #999;
    }

    .breadcrumb a {
      color: #666;
      text-decoration: none;
    }

    .breadcrumb a:hover { color: #1a1a1a; }

    .main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .error-banner {
      background: #fce4ec;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .listing-grid {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .listing-left { flex: 1; }
    .listing-right { width: 320px; }

    .card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      margin-bottom: 14px;
    }

    .photo-placeholder {
      display: flex;
      gap: 10px;
    }

    .photo-box {
      width: 150px;
      height: 120px;
      border: 1px dashed #ccc;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #aaa;
      background: #fafaf8;
    }

    .listing-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .seller-info {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 500; }

    .price-display {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      color: #1a1a1a;
      margin: 16px 0;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge.sale { background: #e8eaf6; color: #3949ab; }
    .badge.trade { background: #f3e5f5; color: #6a1b9a; }
    .badge.both { background: #e6f4ea; color: #2d7a3a; }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      background: white;
      color: #1a1a1a;
      text-align: center;
    }

    .btn:hover { border-color: #1a1a1a; }

    .btn.primary {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .btn.primary:hover { background: #333; }

    .btn.danger {
      color: #c62828;
      border-color: #ef9a9a;
    }

    .btn.danger:hover { border-color: #c62828; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      margin-top: 48px;
    }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/Buyer/buyer.html">Switchr</a>
  <div class="nav-links">
    <a href="/Buyer/buyer.html">Browse</a>
    <span id="authLinks"></span>
  </div>
</nav>

<div class="header-bar">
  <p class="breadcrumb">
    <a href="/Buyer/buyer.html">&larr; Back to Browse</a>
  </p>
</div>

<div class="main">

  <div class="error-banner" id="errorBanner"></div>

  <div id="listingContent" class="listing-grid">
    <div class="listing-left">
      <div class="card">
        <p style="color:#aaa; text-align:center; padding:20px;">Loading listing...</p>
      </div>
    </div>
  </div>

</div>

<footer>Switchr &mdash; Sprint 3 &mdash; CSE 4214</footer>

<script>
  // auth header
  var authLinks = document.getElementById('authLinks');
  if (isLoggedIn()) {
    var user = getUser();
    var links = '<a href="/profile.html">' + (user ? user.username : 'Profile') + '</a>';
    links += ' <a href="#" onclick="logout()">Logout</a>';
    authLinks.innerHTML = links;
  } else {
    authLinks.innerHTML = '<a href="/login.html">Login</a> <a href="/register.html">Sign Up</a>';
  }

  // get listing ID from URL
  var params = new URLSearchParams(window.location.search);
  var listingId = params.get('id');

  if (!listingId) {
    window.location.href = '/Buyer/buyer.html';
  }

  fetch('/api/listings/browse/' + listingId)
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) {
      var banner = document.getElementById('errorBanner');
      banner.textContent = data.error;
      banner.style.display = 'block';
      return;
    }

    var l = data.listing;
    var typeClass = l.listing_type ? l.listing_type.toLowerCase() : 'sale';
    var typeLabel = l.listing_type === 'SALE' ? 'For Sale' : l.listing_type === 'TRADE' ? 'For Trade' : 'Sale or Trade';

    document.title = l.title + ' - Switchr';

    var html = '<div class="listing-left">';

    html += '<div class="card">';
    html += '<div class="photo-placeholder">';
    html += '<div class="photo-box">IMG 1</div>';
    html += '<div class="photo-box">IMG 2</div>';
    html += '<div class="photo-box">IMG 3</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<h1 class="listing-title">' + l.title + '</h1>';
    html += '<p class="seller-info">Listed by <strong>' + l.seller_username + '</strong> &middot; ' + (l.created_at || '') + '</p>';

    html += '<div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">' + l.category + '</span></div>';
    html += '<div class="detail-row"><span class="detail-label">Condition</span><span class="detail-value">' + l.condition + '</span></div>';
    html += '<div class="detail-row"><span class="detail-label">Listing Type</span><span class="detail-value"><span class="badge ' + typeClass + '">' + typeLabel + '</span></span></div>';
    html += '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">' + l.status + '</span></div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<h3>Description</h3>';
    html += '<p style="font-size:14px; line-height:1.6; color:#444;">' + l.description + '</p>';
    html += '</div>';

    html += '</div>'; // end listing-left

    html += '<div class="listing-right">';
    html += '<div class="card">';
    html += '<p class="price-display">$' + parseFloat(l.price).toFixed(2) + '</p>';
    var qty = l.quantity || 0;
    if (qty <= 0) {
        html += '<p style="color:#c62828;font-weight:600;font-size:14px;margin-bottom:12px;">Sold Out</p>';
    } else if (qty <= 3) {
        html += '<p style="color:#e65100;font-weight:600;font-size:13px;margin-bottom:12px;">Only ' + qty + ' left in stock!</p>';
    } else {
        html += '<p style="color:#2d7a3a;font-weight:600;font-size:13px;margin-bottom:12px;">' + qty + ' in stock</p>';
    }

    if (l.listing_type === 'SALE' || l.listing_type === 'BOTH') {
      if (qty <= 0) {
          html += '<button class="btn primary" disabled style="opacity:0.5;cursor:not-allowed;">Sold Out</button>';
      } else {
          html += '<button class="btn primary" onclick="addToCart(' + l.id + ')">Add to Cart</button>';
          html += '<a class="btn" href="/Buyer/cart.html" style="text-align:center; text-decoration:none;">View Cart</a>';
      }
    }
    if (l.listing_type === 'TRADE' || l.listing_type === 'BOTH') {
      if (qty > 0) {
          html += '<button class="btn" onclick="alert(\'Trade offer flow coming soon!\')">Offer Trade</button>';
      }
    }

    html += '<button class="btn" onclick="alert(\'Messaging coming soon!\')">Message Seller</button>';
    html += '<button class="btn danger" onclick="alert(\'Report flow coming soon!\')">Report Listing</button>';
    html += '</div>';
    html += '</div>';

    document.getElementById('listingContent').innerHTML = html;
  })
  .catch(function() {
    var banner = document.getElementById('errorBanner');
    banner.textContent = 'Could not load listing. Please try again.';
    banner.style.display = 'block';
  });

  function addToCart(listingId) {
    var token = localStorage.getItem('token');
    if (!token) {
      window.location.href = '/login.html';
      return;
    }

    fetch('/api/cart', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ listing_id: listingId })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.message) {
        alert('Added to cart! Go to cart to checkout.');
      } else {
        alert(data.error || 'Could not add to cart.');
      }
    })
    .catch(function() {
      alert('Network error. Try again.');
    });
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }
</script>

</body>
</html>
