<!DOCTYPE html>
<html>
<head>
    <title>Switchr Buyer Page</title>
    <script src="../js/auth.js"></script>
</head>

<body>

    <!-- Header / Navigation -->
    <header>
        <h2>Switchr</h2>

        <nav>
            <a href="/Buyer/buyer.html">Browse</a> |
            <a href="/offers.html">Offers</a> |
            <a href="#">Messages</a> |
            <a href="/profile.html">Profile</a>
        </nav>

        <div id="authLinks">
            <a href="/login.html">Login</a> |
            <a href="/register.html">Sign Up</a>
        </div>

        <hr>
    </header>

    <!-- Main Content -->
    <main>

        <h1>Browse Listings</h1>

        <!-- Search Bar -->
        <form onsubmit="return false;">
            <input type="text" id="searchInput" placeholder="Search listings..." oninput="filterListings()">
            <button type="button" onclick="filterListings()">Search</button>
        </form>

        <br>

        <!-- Two-column layout: Filters (left) + Listings (right) -->
        <div style="display: flex; gap: 20px;">

            <!-- Filters column -->
            <aside style="width: 250px; border: 1px solid black; padding: 10px;">
                <h3>Filters</h3>

                <form onsubmit="return false;">

                    <label><strong>Category</strong></label><br>
                    <select id="filterCategory" onchange="filterListings()">
                        <option value="">Any</option>
                        <option>Phones</option>
                        <option>Laptops</option>
                        <option>Tablets</option>
                        <option>Headphones</option>
                        <option>Chargers</option>
                        <option>Other</option>
                    </select>

                    <br><br>

                    <label><strong>Condition</strong></label><br>
                    <select id="filterCondition" onchange="filterListings()">
                        <option value="">Any</option>
                        <option value="NEW">New</option>
                        <option value="LIKE_NEW">Like New</option>
                        <option value="GOOD">Good</option>
                        <option value="FAIR">Fair</option>
                        <option value="POOR">Poor</option>
                    </select>

                    <br><br>

                    <label><strong>Listing Type</strong></label><br>
                    <select id="filterType" onchange="filterListings()">
                        <option value="">Any</option>
                        <option value="SALE">For Sale</option>
                        <option value="TRADE">For Trade</option>
                        <option value="BOTH">Both</option>
                    </select>

                    <br><br>

                    <button type="button" onclick="clearFilters()">Clear</button>

                </form>
            </aside>

            <!-- Listings column -->
            <section style="flex: 1; border: 1px solid black; padding: 10px;">
                <h3>Results (<span id="resultCount">0</span>)</h3>

                <div id="listingsContainer">
                    <p>Loading listings...</p>
                </div>
            </section>

        </div>

    </main>

    <footer style="margin-top: 20px; border-top: 1px solid black; padding: 10px;">

        <p>
            <a href="#">Terms</a> |
            <a href="#">Privacy</a> |
            <a href="#">Help</a>
        </p>

        <p style="font-size: 12px;">
            Switchr Marketplace - Skeleton Version
        </p>

    </footer>

    <script>
        // Update header based on login state
        var authLinks = document.getElementById('authLinks');
        if (isLoggedIn()) {
            var user = getUser();
            var links = '<span>' + (user ? user.username : 'User') + '</span> | ';
            if (user && user.role === 'seller') {
                links += '<a href="/Seller/Seller_Home.html">Seller Dashboard</a> | ';
            }
            if (user && user.role === 'admin') {
                links += '<a href="/Admin/admin.html">Admin Dashboard</a> | ';
            }
            links += '<a href="#" onclick="logout()">Logout</a>';
            authLinks.innerHTML = links;
        }

        var allListings = [];

        // Fetch active listings (public, no auth needed)
        fetch('/api/listings/browse')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            allListings = data.listings || [];
            renderListings(allListings);
        })
        .catch(function() {
            document.getElementById('listingsContainer').innerHTML = '<p>Could not load listings.</p>';
        });

        function renderListings(listings) {
            var container = document.getElementById('listingsContainer');
            document.getElementById('resultCount').textContent = listings.length;

            if (listings.length === 0) {
                container.innerHTML = '<p>No listings found.</p>';
                return;
            }

            var html = '';
            listings.forEach(function(l) {
                html += '<article style="border: 1px solid gray; padding: 10px; margin-bottom: 10px;">';
                html += '<div style="display: flex; gap: 10px;">';
                html += '<div style="width: 100px; height: 80px; border: 1px dashed black; display: flex; align-items: center; justify-content: center;">IMG</div>';
                html += '<div>';
                html += '<h4 style="margin: 0;">' + l.title + '</h4>';
                html += '<p style="margin: 5px 0;">Condition: ' + l.condition + '</p>';
                html += '<p style="margin: 5px 0;">Price: $' + parseFloat(l.price).toFixed(2) + '</p>';
                html += '<p style="margin: 5px 0;">Type: ' + l.listing_type + '</p>';
                html += '<p style="margin: 5px 0;">Seller: ' + l.seller_username + '</p>';
                html += '<a href="listing.html">View Details</a>';
                html += '</div>';
                html += '</div>';
                html += '</article>';
            });

            container.innerHTML = html;
        }

        function filterListings() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var category = document.getElementById('filterCategory').value;
            var condition = document.getElementById('filterCondition').value;
            var type = document.getElementById('filterType').value;

            var filtered = allListings.filter(function(l) {
                if (search && l.title.toLowerCase().indexOf(search) === -1) return false;
                if (category && l.category !== category) return false;
                if (condition && l.condition !== condition) return false;
                if (type && l.listing_type !== type) return false;
                return true;
            });

            renderListings(filtered);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterCondition').value = '';
            document.getElementById('filterType').value = '';
            renderListings(allListings);
        }
    </script>

</body>

</html>
